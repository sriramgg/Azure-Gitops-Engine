name: Cloud-Native GitOps Engine Lifecycle
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Authenticate ACR & Build Docker Image
      run: |
        az acr login --name sriramacr
        docker build -t sriramacr.azurecr.io/jobguard-app:${{ github.sha }} .

    - name: Push Image to ACR
      run: |
        docker push sriramacr.azurecr.io/jobguard-app:${{ github.sha }}

    - name: Tag as latest
      run: |
        docker tag sriramacr.azurecr.io/jobguard-app:${{ github.sha }} sriramacr.azurecr.io/jobguard-app:latest
        docker push sriramacr.azurecr.io/jobguard-app:latest

    - name: Cleanup Docker credentials
      run: docker logout

  deploy-to-aks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set AKS context
      run: |
        az aks get-credentials --resource-group ${{ secrets.AKS_RG }} --name ${{ secrets.AKS_NAME }}

    - name: Deploy to AKS
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|sriramacr.azurecr.io/jobguard-app:${{ github.sha }}|g" k8s/deployment.yaml
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

    - name: Verify rollout status
      run: |
        kubectl rollout status deployment/jobguard-app --timeout=120s
